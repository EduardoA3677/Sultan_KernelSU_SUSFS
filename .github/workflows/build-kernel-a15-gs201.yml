name: Build A15 GS201 Kernel

on:
  workflow_call:

jobs:
  build-kernel-a15-gs201-kernelsu-susfs:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Installing dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip jq libarchive-tools zip lib32z-dev libghc-bzlib-dev pngcrush '^liblzma.*' \
            python-is-python3 libsdl1.2-dev autoconf libxml2-utils wget pkg-config unzip w3m gawk imagemagick \
            libc6-dev gcc-multilib patchelf gzip clang subversion optipng device-tree-compiler ccache gcc \
            '^liblz4-.*' lzip rsync automake fastboot patch zip pngquant expat lzop libswitch-perl \
            make libcap-dev adb libxml2 bison libxml-simple-perl zlib1g-dev libarchive-tools libtool \
            squashfs-tools gperf '^lzma.*' libfl-dev ncurses-dev pwgen flex libtinfo5 minicom liblz4-tool \
            libmpfr-dev libssl-dev lib32ncurses5-dev libbz2-dev lib32z1-dev libgmp-dev git libncurses5-dev \
            dpkg-dev libmpc-dev lftp python3 rar git-lfs policycoreutils unrar \
            ncftp tree bzip2 bc ftp software-properties-common tar libgl1-mesa-dev \
            texinfo schedtool curl libexpat1-dev llvm libc6-dev-i386 apt-utils cmake g++-multilib build-essential \
            re2c axel maven xsltproc g++ libx11-dev libxml-sax-base-perl gnupg bash
          
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          
      - name: Set environment variables for Clang 19
        run: |
          echo "Setting environment variables for Clang 19..."
          echo "CC=clang-19" >> $GITHUB_ENV
          echo "CXX=clang++-19" >> $GITHUB_ENV
          echo "LD=ld.lld-19" >> $GITHUB_ENV
          echo "AR=llvm-ar-19" >> $GITHUB_ENV
          echo "NM=llvm-nm-19" >> $GITHUB_ENV
          echo "OBJDUMP=llvm-objdump-19" >> $GITHUB_ENV
          echo "OBJCOPY=llvm-objcopy-19" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "LLVM=1" >> $GITHUB_ENV

      - name: Set CONFIG Environment Variable
        run: |
          CONFIG="RadioactiveKernel_Pantah"
          echo "CONFIG=$CONFIG" >> $GITHUB_ENV
          echo "CONFIG set to: $CONFIG"

      - name: Clone AnyKernel3 and Other Dependencies
        run: |
          echo "Cloning AnyKernel3 and other dependencies..."
          ANYKERNEL_BRANCH="15.0.0-sultan-gs201"
          SUSFS_BRANCH="gki-android13-5.10"

          git clone https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"
          git clone https://github.com/EduardoA3677/kernel_patches.git
          git clone https://github.com/acuicultor/RadioactiveKernel_Pantah.git

      - name: Build the Kernel
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Building the kernel..."
          make radioactive_defconfig -j$(nproc --all)
          make -j$(nproc --all) \
            CC=clang-19 \
            LD=ld.lld-19 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Copy Images
        run: |
          echo "Changing to configuration directory: $CONFIG..."
          cd "$CONFIG"

          echo "Copying Image.lz4 and concatenating DTB files..."
          cp ./out/arch/arm64/boot/Image.lz4 ../AnyKernel3/Image.lz4
          cat ./out/arch/arm64/boot/dts/google/*.dtb > ../AnyKernel3/dtb
          cp ./out/arch/arm64/boot/dts/google/dtbo.img ../AnyKernel3/dtbo.img

      - name: Create ZIP Files for Different Formats
        run: |
          echo "Navigating to AnyKernel3 directory..."
          cd ./AnyKernel3
          ZIP_NAME="A15_Radioctive_KernelSU_SUSFS_GS201.zip"
          zip -r "../$ZIP_NAME" ./*

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-gs201
          path: |
            *.zip
